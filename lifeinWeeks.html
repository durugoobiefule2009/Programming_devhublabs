<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="lifeInWeeks.js"></script>
    <style>
        body{
            background-color: lightgray;
            text-align: center;
            margin-top: 50px;
            color: black;
        }
        #container{
          text-align: center;
            margin-top: 50px;
            color: black;
            background-color: lightblue;
            width: 500px;
            height: 350px;
            margin-top: 50px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
        }
        h1{
            font-size: 30px;
        }
        input{
            width: 200px;
            height: 30px;
            border-radius: 5px;
            border: none;
            padding-left: 10px;
            background-color: white;
        }
        button{
            width: 120px;
            height: 50px;
            border-radius: 5px;
            border: none;
            background-color: lightgreen;
            cursor: pointer;
            font: bold 16px Arial, sans-serif;
        }
        p{
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Time left</h1>
        <p>See how much time you have left assuming you live to 90:</p>
        <label for="age">Current Age:</label>
        <input type="number" id="age" name="age"><br><br>
        <button onclick="lifeInWeeks()">Calculate</button>
        <p id="result"></p>
    </div>
</body>
</html>
